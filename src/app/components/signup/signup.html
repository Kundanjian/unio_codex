<section class="auth-shell">
  <div class="auth-backdrop"></div>

  <article class="auth-card">
    <p class="auth-kicker">Join the community</p>
    <h1>Register/Signup</h1>

    <form class="auth-form">
      <div class="split">
        <label>
          <span>First name</span>
          <input type="text" placeholder="First name" />
        </label>

        <label>
          <span>Last name</span>
          <input type="text" placeholder="Last name" />
        </label>
      </div>

      <label>
        <span>Continue with phone number/ gmail</span>
        <input type="text" placeholder="Enter phone number or email" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" placeholder="Create password" />
      </label>

      <label>
        <span>Confirm Password</span>
        <input type="password" placeholder="Confirm password" />
      </label>

      <button type="button" class="cta">Request OTP</button>
    </form>

    <p class="auth-switch">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </article>
</section>
