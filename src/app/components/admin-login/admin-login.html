<section class="auth-shell">
  <div class="auth-backdrop"></div>

  <article class="auth-card">
    <p class="auth-kicker">Restricted access</p>
    <h1>Admin Login</h1>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="submit()">
      <label>
        <span>Email</span>
        <input type="email" placeholder="Enter admin email" formControlName="email" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" placeholder="Enter password" formControlName="password" />
      </label>

      @if (errorMessage) {
        <p class="error-msg">{{ errorMessage }}</p>
      }

      <button type="submit" class="cta" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login as admin' }}
      </button>
    </form>

    <p class="auth-switch">
      User login?
      <a routerLink="/login">Go to user login</a>
    </p>
  </article>
</section>
