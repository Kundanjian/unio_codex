<header class="navbar">
  <div class="nav-top">
    <div class="nav-left">
      <button type="button" class="menu-btn" aria-label="Open menu" (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <a class="brand" routerLink="/" (click)="closeMenu()">
        <img src="/unio-logo-transparent.png" alt="Unio logo" class="brand-logo" />
      </a>
    </div>

    <div class="nav-filters" aria-label="Primary filters">
      <label class="nav-filter">
        <span>Duration</span>
        <select>
          <option>Daily</option>
          <option>Weekly</option>
          <option>Monthly</option>
        </select>
      </label>

      <label class="nav-filter">
        <span>Location</span>
        <select>
          <option>Jabalpur</option>
          <option>Jabalpur, Madhya Pradesh</option>
          <option>Madhya Pradesh</option>
          <option>Use current location</option>
        </select>
      </label>
    </div>

    <div class="nav-right">
      <button
        type="button"
        class="theme-toggle"
        [attr.aria-label]="theme === 'light' ? 'Switch to dark theme' : 'Switch to light theme'"
        (click)="toggleTheme()"
      >
        <span class="theme-toggle-track">
          <span class="theme-toggle-thumb"></span>
        </span>
        <span class="theme-toggle-label">{{ theme === 'light' ? 'Light' : 'Dark' }}</span>
      </button>

      <div class="auth-actions">
        <a routerLink="/login" class="ghost-btn" (click)="closeMenu()">Log in</a>
        <a routerLink="/signup" class="primary-btn" (click)="closeMenu()">Register</a>
      </div>
    </div>
  </div>

  <div class="booking-shell">
    <p class="booking-note">Book your ideal rental stay directly from landlords.</p>

    <div class="booking-bar" aria-label="Rental booking filters">
      <label class="booking-field booking-field-location">
        <span class="booking-label">City, property name or location</span>
        <strong>Jabalpur</strong>
        <small>Madhya Pradesh</small>
      </label>

      <label class="booking-field">
        <span class="booking-label">Guests</span>
        <select>
          <option>1 Adult</option>
          <option>2 Adults</option>
          <option>Family / Group</option>
        </select>
        <small>Add adults and children</small>
      </label>

      <label class="booking-field">
        <span class="booking-label">Move-In</span>
        <select>
          <option>Select date</option>
          <option>This week</option>
          <option>This month</option>
        </select>
        <small>Flexible start date</small>
      </label>

      <label class="booking-field">
        <span class="booking-label">Stay Length</span>
        <select>
          <option>1-7 days</option>
          <option>1-4 weeks</option>
          <option>1-12 months</option>
        </select>
        <small>Short and long term</small>
      </label>

      <label class="booking-field">
        <span class="booking-label">Budget</span>
        <select>
          <option>Rs 2,000 - Rs 6,000</option>
          <option>Rs 6,000 - Rs 12,000</option>
          <option>Rs 12,000+</option>
        </select>
        <small>Rent per stay cycle</small>
      </label>
    </div>

    <div class="booking-cta-wrap">
      <a routerLink="/quick-rent" class="booking-cta" (click)="closeMenu()">Search</a>
    </div>
  </div>
</header>

@if (menuOpen) {
  <button type="button" class="menu-backdrop" aria-label="Close menu" (click)="closeMenu()"></button>

  <aside class="menu-drawer">
    <div class="drawer-head">
      <div class="avatar">N</div>
      <div>
        <h2>Name</h2>
        <p>Flexible rental seeker</p>
      </div>
    </div>

    <nav class="drawer-links">
      <a routerLink="/" (click)="closeMenu()">Home</a>
      <a routerLink="/quick-rent" (click)="closeMenu()">Accommodation</a>
      <a routerLink="/orders" (click)="closeMenu()">My Orders</a>
      <a routerLink="/settings" (click)="closeMenu()">Settings</a>
      <a routerLink="/login" (click)="closeMenu()">Log out</a>
    </nav>
  </aside>
}
