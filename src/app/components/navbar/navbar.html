<header class="navbar">
  <div class="nav-top">
    <div class="brand-zone">
      <button type="button" class="menu-btn" aria-label="Open menu" (click)="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <a class="brand" routerLink="/" (click)="closeMenu()">
        <img src="/unio-logo.png" alt="Unio logo" class="brand-logo" />
        <div class="brand-copy">
          <strong>Accommodation rentals</strong>
          <span>Directly from landlords for flexible stays</span>
        </div>
      </a>
    </div>

    <div class="context-strip">
      <div class="context-card">
        <span class="context-label">Duration</span>
        <strong>Daily, Weekly, Monthly</strong>
      </div>

      <div class="context-card">
        <span class="context-label">Location</span>
        <strong>Jabalpur, Madhya Pradesh</strong>
      </div>
    </div>

    <div class="auth-actions">
      <a routerLink="/login" class="ghost-btn" (click)="closeMenu()">Log in</a>
      <a routerLink="/signup" class="primary-btn" (click)="closeMenu()">Register</a>
    </div>
  </div>

  <div class="nav-bottom">
    <label class="toolbar-search">
      <span class="search-label">Search rentals</span>
      <input type="text" value="Hostels, flats, apartments, villas..." />
    </label>

    <nav class="nav-links" aria-label="Primary navigation">
      <a routerLink="/quick-rent" routerLinkActive="active" (click)="closeMenu()">Rentals</a>
      <a routerLink="/accessories" routerLinkActive="active" (click)="closeMenu()">Accessories</a>
      <a routerLink="/help" routerLinkActive="active" (click)="closeMenu()">About</a>
    </nav>
  </div>
</header>

@if (menuOpen) {
  <button type="button" class="menu-backdrop" aria-label="Close menu" (click)="closeMenu()"></button>

  <aside class="menu-drawer">
    <div class="drawer-head">
      <div class="avatar">N</div>
      <div>
        <h2>Name</h2>
        <p>Flexible rental seeker</p>
      </div>
    </div>

    <nav class="drawer-links">
      <a routerLink="/quick-rent" (click)="closeMenu()">Accommodation</a>
      <a routerLink="/accessories" (click)="closeMenu()">Accessories</a>
      <a routerLink="/orders" (click)="closeMenu()">My Orders</a>
      <a routerLink="/help" (click)="closeMenu()">About platform</a>
      <a routerLink="/settings" (click)="closeMenu()">Settings</a>
      <a routerLink="/login" (click)="closeMenu()">Log out</a>
    </nav>
  </aside>
}
