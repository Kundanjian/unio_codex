<section class="auth-shell">
  <div class="auth-backdrop"></div>

  <article class="auth-card">
    <p class="auth-kicker">Welcome back</p>
    <h1>LOGIN</h1>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="login()">
      <label>
        <span>Email</span>
        <input type="email" placeholder="Enter email" formControlName="email" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" placeholder="Enter password" formControlName="password" />
      </label>

      @if (errorMessage) {
        <p class="auth-message error">{{ errorMessage }}</p>
      }

      <button type="submit" class="cta" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="auth-switch">
      New here?
      <a routerLink="/signup">Create an account</a>
    </p>

    <p class="auth-admin-link">
      Admin account?
      <a routerLink="/admin-login">Use admin login</a>
    </p>
  </article>
</section>
