<section class="auth-shell">
  <div class="auth-backdrop"></div>

  <article class="auth-card">
    <p class="auth-kicker">Welcome back</p>
    <h1>LOGIN</h1>

    <form class="auth-form">
      <label>
        <span>Continue with phone number/ gmail</span>
        <input type="text" placeholder="Enter phone number or email" />
      </label>

      <label>
        <span>Password</span>
        <input type="password" placeholder="Enter password" />
      </label>

      <p class="auth-divider">or</p>

      <button type="button" class="cta">Request OTP</button>
    </form>

    <p class="auth-switch">
      New here?
      <a routerLink="/signup">Create an account</a>
    </p>
  </article>
</section>
