<section class="page-shell">
  <div class="page-head">
    <p class="eyebrow">Preferences</p>
    <h1>Setting</h1>
    <p>Manage your account, communication and privacy controls.</p>
  </div>

  <section class="settings-grid">
    @for (item of settings; track item.label) {
      <article class="setting-card">
        <h2>{{ item.label }}</h2>
        <p>{{ item.value }}</p>
      </article>
    }
  </section>
</section>
