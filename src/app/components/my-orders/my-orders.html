<section class="page-shell">
  <div class="page-head">
    <p class="eyebrow">Rental history</p>
    <h1>My Orders</h1>
    <p>Track current stays, upcoming bookings and completed rentals in one place.</p>
  </div>

  <section class="orders-grid">
    @for (order of orders; track order.title) {
      <article class="order-card">
        <div class="status-row">
          <h2>{{ order.title }}</h2>
          <span class="status" [class.active]="order.status === 'Active'" [class.completed]="order.status === 'Completed'">
            {{ order.status }}
          </span>
        </div>

        <p>{{ order.duration }}</p>
        <strong>{{ order.amount }}</strong>
      </article>
    }
  </section>
</section>
